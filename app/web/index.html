<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Healing Score Agent</title>
  <link rel="stylesheet" href="/health/ui/styles.css" />
</head>
<body>
  <div class="shell" id="shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">H</div>
        <div>
          <h1>Healing Agent</h1>
          <p>用户端对话界面</p>
        </div>
      </div>
      <button id="newSessionBtn" class="primary wide">+ 新建对话</button>
      <div class="side-title">历史会话</div>
      <div id="sessionList" class="session-list"></div>
    </aside>

    <main class="chat-panel">
      <header class="chat-header">
        <div>
          <h2 id="chatTitle">新建对话</h2>
          <p id="chatSubtitle">输入第一句话后会自动生成会话标题和 session_id</p>
        </div>
        <div class="header-actions">
          <button id="toggleDevBtn" class="ghost">开发者模式</button>
          <button id="deleteSessionBtn" class="ghost">删除当前对话</button>
        </div>
      </header>

      <section id="messages" class="messages">
        <div class="empty-state">
          <div class="empty-icon">💬</div>
          <h3>开始一次新的对话</h3>
          <p>可以只输入文本，也可以先录音、试听后，再补充文本并发送。</p>
        </div>
      </section>

      <section id="audioDraft" class="audio-draft hidden">
        <div>
          <strong id="audioStatus">已暂存语音</strong>
          <span id="audioMeta"></span>
        </div>
        <audio id="audioPreview" controls></audio>
        <button id="clearAudioBtn" class="ghost danger">删除语音</button>
      </section>

      <footer class="composer">
        <textarea id="textInput" rows="2" placeholder="输入你想说的话……"></textarea>
        <div class="composer-actions">
          <button id="recordBtn" class="ghost mic">🎙 录音</button>
          <button id="sendBtn" class="primary">发送</button>
        </div>
      </footer>
    </main>

    <aside id="devPanel" class="dev-panel">
      <div class="dev-header">
        <div>
          <h2>开发者模式</h2>
          <p>执行链路、评分曲线与风险曲线</p>
        </div>
      </div>
      <div class="dev-section">
        <h3>本轮执行链路</h3>
        <div id="devTrace" class="dev-trace">暂无请求</div>
      </div>
      <div class="dev-section">
        <h3>评分曲线</h3>
        <canvas id="scoreCanvas" width="320" height="150"></canvas>
      </div>
      <div class="dev-section">
        <h3>风险等级曲线</h3>
        <canvas id="riskCanvas" width="320" height="150"></canvas>
      </div>
    </aside>
  </div>

  <script src="/health/ui/app.js"></script>
</body>
</html>
